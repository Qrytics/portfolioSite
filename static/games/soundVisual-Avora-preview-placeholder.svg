<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Arcade-style placeholder preview</title>
  <desc id="desc">Neon arcade placeholder image for in-progress games.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1022" />
      <stop offset="100%" stop-color="#141b34" />
    </linearGradient>
    <linearGradient id="neonA" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>
    <linearGradient id="neonB" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#f472b6" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)" />
  <rect x="32" y="32" width="1216" height="656" rx="14" fill="none" stroke="#334155" stroke-width="2"/>
  <rect x="56" y="56" width="1168" height="608" rx="12" fill="none" stroke="#1f2b4a" stroke-width="1.5"/>

  <!-- Pixel-ish stars -->
  <g opacity="0.5">
    <rect x="140" y="150" width="4" height="4" fill="#22d3ee"/>
    <rect x="250" y="110" width="4" height="4" fill="#a78bfa"/>
    <rect x="370" y="160" width="4" height="4" fill="#22d3ee"/>
    <rect x="980" y="140" width="4" height="4" fill="#a78bfa"/>
    <rect x="1120" y="190" width="4" height="4" fill="#22d3ee"/>
    <rect x="1060" y="540" width="4" height="4" fill="#a78bfa"/>
    <rect x="260" y="560" width="4" height="4" fill="#22d3ee"/>
  </g>

  <!-- HUD header -->
  <text x="640" y="120" fill="#e2e8f0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="58" text-anchor="middle">
    GAME PREVIEW
  </text>
  <text x="640" y="168" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24" text-anchor="middle">
    IN PROGRESS - ARCADE BUILD
  </text>

  <!-- Controller silhouette -->
  <g transform="translate(640 410)" filter="url(#glow)">
    <rect x="-230" y="-90" width="460" height="180" rx="86" fill="#111827" stroke="#334155" stroke-width="2"/>
    <circle cx="-120" cy="0" r="40" fill="#0b1220" stroke="#475569" stroke-width="2"/>
    <rect x="-148" y="-8" width="56" height="16" rx="4" fill="url(#neonA)"/>
    <rect x="-128" y="-28" width="16" height="56" rx="4" fill="url(#neonA)"/>
    <circle cx="110" cy="-24" r="16" fill="url(#neonB)"/>
    <circle cx="142" cy="0" r="16" fill="url(#neonA)"/>
    <circle cx="78" cy="0" r="16" fill="url(#neonA)"/>
    <circle cx="110" cy="24" r="16" fill="url(#neonB)"/>
    <rect x="-38" y="-12" width="76" height="24" rx="12" fill="#0b1220" stroke="#334155"/>
  </g>

  <!-- Bottom status strip -->
  <rect x="120" y="600" width="1040" height="8" rx="4" fill="#1e293b"/>
  <rect x="120" y="600" width="640" height="8" rx="4" fill="url(#neonA)"/>
  <text x="120" y="642" fill="#67e8f9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="22">
    placeholder_asset://arcade-style
  </text>
</svg>
