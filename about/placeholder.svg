<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b0e12"/>
      <stop offset="100%" stop-color="#0f141b"/>
    </linearGradient>
    <pattern id="chk" width="80" height="80" patternUnits="userSpaceOnUse">
      <rect width="80" height="80" fill="rgba(255,255,255,0.02)"/>
      <rect x="0" y="0" width="40" height="40" fill="rgba(54,242,194,0.06)"/>
      <rect x="40" y="40" width="40" height="40" fill="rgba(54,242,194,0.06)"/>
    </pattern>
  </defs>

  <rect width="1200" height="900" fill="url(#g)"/>
  <rect width="1200" height="900" fill="url(#chk)" opacity="0.9"/>
  <rect x="80" y="80" width="1040" height="740" rx="18" fill="rgba(0,0,0,0.28)" stroke="rgba(222,232,255,0.14)"/>

  <text x="600" y="425" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace" font-size="42" fill="rgba(243,246,255,0.86)">Replace with your photo</text>
  <text x="600" y="490" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace" font-size="24" fill="rgba(243,246,255,0.6)">Put images in static/about/ and update the page</text>
</svg>

