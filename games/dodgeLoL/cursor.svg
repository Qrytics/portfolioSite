<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="outer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d8d8d8"/>
      <stop offset="40%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#b0b0b0"/>
      <stop offset="100%" stop-color="#707070"/>
    </linearGradient>
    <linearGradient id="inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2a"/>
      <stop offset="100%" stop-color="#0d0d18"/>
    </linearGradient>
  </defs>
  <!-- Outer diamond kite shape -->
  <polygon points="20,2 38,20 20,38 2,20" fill="url(#outer)"/>
  <!-- Inner dark diamond -->
  <polygon points="20,8 34,20 20,32 6,20" fill="url(#inner)"/>
  <!-- Tiny center highlight -->
  <polygon points="20,13 27,20 20,27 13,20" fill="#1e1e32" stroke="#3a3a5a" stroke-width="0.5"/>
</svg>
