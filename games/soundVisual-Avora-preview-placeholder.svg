    <rect x="680" y="250" width="60" height="310" rx="8" fill="url(#bar)" />
    <rect x="780" y="300" width="60" height="260" rx="8" fill="url(#bar)" />
    <rect x="880" y="360" width="60" height="200" rx="8" fill="url(#bar)" />
    <rect x="980" y="430" width="60" height="130" rx="8" fill="url(#bar)" />
  </g>

