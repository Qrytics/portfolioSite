<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">soundVisual-Avora placeholder preview</title>
  <desc id="desc">Temporary placeholder image for soundVisual-Avora game card preview.</desc>
  <defs>
