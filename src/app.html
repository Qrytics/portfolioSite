<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" href="/icons/portfolio-logo-2.ico" type="image/x-icon" />
		<link rel="apple-touch-icon" href="/icons/portfolio-logo-2-apple-touch-icon.ico" />
		<script>
			(function () {
				try {
					var savedTheme = window.localStorage.getItem('theme');
					var theme =
						savedTheme === 'dark' || savedTheme === 'light'
							? savedTheme
							: window.matchMedia('(prefers-color-scheme: dark)').matches
								? 'dark'
								: 'light';

					document.documentElement.dataset.theme = theme;
					document.documentElement.style.colorScheme = theme;

					var themeColor = document.querySelector('meta[name="theme-color"]');
					if (!themeColor) {
						themeColor = document.createElement('meta');
						themeColor.setAttribute('name', 'theme-color');
						document.head.appendChild(themeColor);
					}
					themeColor.setAttribute('content', theme === 'dark' ? '#0b0e12' : '#FFFFFF');
				} catch (_) {}
			})();
		</script>
		<script>
			(function () {
				try {
					if (window.location.pathname !== '/') return;
					var key = 'instant-home-hash-scroll';
					if (window.sessionStorage.getItem(key)) {
						document.documentElement.classList.add('instant-home-jump-pending');
					}
				} catch (_) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
